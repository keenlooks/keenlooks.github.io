{% if page.math %}
<!-- MathJax is loaded ONLY on pages that opt in with `math: true` front matter.
     It parses any DOM text between $...$ as math (see the currency-mangling
     gotcha in CLAUDE.md), so keep it off pages that don't need it. -->
<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>
{% endif %}

<!-- Light/dark theme toggle (defaults to OS setting; visitor choice saved in localStorage) -->
<script>
  (function () {
    /* Apply any saved preference immediately so there's no flash of the wrong theme. */
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    } catch (e) {}

    function effectiveTheme() {
      var forced = document.documentElement.getAttribute('data-theme');
      if (forced === 'light' || forced === 'dark') return forced;
      return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }

    /* Monochrome (Feather-style) icons; stroke="currentColor" so they match text. */
    var ICON_SUN = '<svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>';
    var ICON_MOON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    /* A "glider" — the iconic 5-cell Game of Life pattern (used by the background easter egg). */
    var ICON_GRID = '<svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="9" y="2" width="6" height="6" rx="1"></rect><rect x="16" y="9" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="16" width="6" height="6" rx="1"></rect><rect x="16" y="16" width="6" height="6" rx="1"></rect></svg>';
    /* A back arrow (shown on full-screen pages to return to the previous page). */
    var ICON_BACK = '<svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>';

    function render(btn) {
      var t = effectiveTheme();
      /* Show the icon for the mode you'll switch TO. */
      btn.innerHTML = (t === 'light') ? ICON_MOON : ICON_SUN;
      var label = (t === 'light') ? 'Switch to dark mode' : 'Switch to light mode';
      btn.setAttribute('aria-label', label);
      btn.setAttribute('title', label);
    }

    function init() {
      if (document.getElementById('theme-toggle')) return;

      /* Let the "Skip to content" link (_layouts/default.html) move focus into
         the main content container. The theme's smooth-scroll plugin
         (main.min.js: $("a").smoothScroll(...)) preventDefaults the anchor
         navigation, so the fragment jump never moves focus on its own —
         move it ourselves on activation. */
      var mainEl = document.getElementById('main');
      if (mainEl && !mainEl.hasAttribute('tabindex')) mainEl.setAttribute('tabindex', '-1');
      var skipEl = document.querySelector('.skip-link');
      if (skipEl && mainEl) {
        skipEl.addEventListener('click', function () {
          mainEl.focus({ preventScroll: true });
        });
      }

      /* Mirror the greedy-nav's open/close state onto the hamburger button's
         aria-expanded (main.min.js toggles the `hidden` class on .hidden-links). */
      var navBtn = document.querySelector('.greedy-nav button');
      var navLinks = document.querySelector('.greedy-nav .hidden-links');
      if (navBtn && navLinks && window.MutationObserver) {
        var syncNav = function () {
          navBtn.setAttribute('aria-expanded', navLinks.classList.contains('hidden') ? 'false' : 'true');
        };
        syncNav();
        new MutationObserver(syncNav).observe(navLinks, { attributes: true, attributeFilter: ['class'] });
      }

      var btn = document.createElement('button');
      btn.id = 'theme-toggle';
      btn.type = 'button';
      render(btn);
      btn.addEventListener('click', function () {
        var next = (effectiveTheme() === 'light') ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        render(btn);
      });
      document.body.appendChild(btn);

      /* Bottom-left "back" button — shown ONLY on full-screen immersive pages
         (e.g. the Game of Life playground) that hide the normal nav. Returns to
         the previous in-site page, falling back to the Fun hub. The Fun nav tab
         is how you reach these pages, so there is no longer a persistent launcher
         button on ordinary pages. */
      if (document.querySelector('.life-app') && !document.getElementById('life-link')) {
        var back = document.createElement('a');
        back.id = 'life-link';
        back.innerHTML = ICON_BACK;
        back.setAttribute('aria-label', 'Back');
        back.setAttribute('title', 'Back');
        back.href = '{{ base_path }}/fun/'; /* fallback if there's no in-site history */
        back.addEventListener('click', function (e) {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
          var ref = document.referrer;
          if (ref && ref.indexOf(window.location.origin) === 0 && ref !== window.location.href) {
            e.preventDefault();
            window.history.back();
          }
        });
        document.body.appendChild(back);
      }

      /* Easter egg: a faint glider in the right margin that reads as part of the
         ambient Game of Life background. Barely visible at rest; brightens and
         slides out a label on hover/focus, then links to the playground. Only the
         small glyph is interactive, so the cursor never turns into a pointer just
         from resting the mouse in the margin. Not shown on the Life page itself
         (styling hides it on small screens — no hover to discover it there). */
      if (!document.querySelector('.life-app') && !document.getElementById('life-egg')) {
        var egg = document.createElement('a');
        egg.id = 'life-egg';
        egg.href = '{{ base_path }}/life/';
        egg.setAttribute('aria-label', "Conway's Game of Life");
        egg.innerHTML = '<span class="life-egg__label">Game of Life</span>' + ICON_GRID;
        document.body.appendChild(egg);
      }

      /* If the OS theme changes and the visitor hasn't forced one, keep the icon in sync. */
      if (window.matchMedia) {
        try {
          window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function () {
            if (!document.documentElement.getAttribute('data-theme')) render(btn);
          });
        } catch (e) {}
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>

<!-- end custom head snippets -->
