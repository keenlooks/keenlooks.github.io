<!-- Light/dark theme toggle (defaults to OS setting; visitor choice saved in localStorage) -->
<script>
  (function () {
    // Apply any saved preference immediately so there's no flash of the wrong theme.
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    } catch (e) {}

    function effectiveTheme() {
      var forced = document.documentElement.getAttribute('data-theme');
      if (forced === 'light' || forced === 'dark') return forced;
      return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }

    // Monochrome (Feather-style) icons; stroke="currentColor" so they match text.
    var ICON_SUN = '<svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>';
    var ICON_MOON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    // A "glider" — the iconic 5-cell Game of Life pattern.
    var ICON_GRID = '<svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="9" y="2" width="6" height="6" rx="1"></rect><rect x="16" y="9" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="16" width="6" height="6" rx="1"></rect><rect x="16" y="16" width="6" height="6" rx="1"></rect></svg>';

    function render(btn) {
      var t = effectiveTheme();
      // Show the icon for the mode you'll switch TO.
      btn.innerHTML = (t === 'light') ? ICON_MOON : ICON_SUN;
      var label = (t === 'light') ? 'Switch to dark mode' : 'Switch to light mode';
      btn.setAttribute('aria-label', label);
      btn.setAttribute('title', label);
    }

    function init() {
      if (document.getElementById('theme-toggle')) return;
      var btn = document.createElement('button');
      btn.id = 'theme-toggle';
      btn.type = 'button';
      render(btn);
      btn.addEventListener('click', function () {
        var next = (effectiveTheme() === 'light') ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        render(btn);
      });
      document.body.appendChild(btn);

      // Easter-egg launcher: link to the full Game of Life playground (hidden on
      // the playground page itself to avoid a self-link).
      if (!document.querySelector('.life-app') && !document.getElementById('life-link')) {
        var life = document.createElement('a');
        life.id = 'life-link';
        life.href = '{{ base_path }}/life/';
        life.setAttribute('aria-label', 'Open the Game of Life playground');
        life.setAttribute('title', "Conway's Game of Life");
        life.innerHTML = ICON_GRID;
        document.body.appendChild(life);
      }

      // If the OS theme changes and the visitor hasn't forced one, keep the icon in sync.
      if (window.matchMedia) {
        try {
          window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function () {
            if (!document.documentElement.getAttribute('data-theme')) render(btn);
          });
        } catch (e) {}
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
